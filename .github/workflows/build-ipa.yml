name: Build Amperfy IPA

on:
  push:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode installations
        run: ls /Applications/ | grep -i xcode || true

      - name: Select Xcode version
        run: |
          # Try Xcode 26.x first, then fall back to latest Xcode.app
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install iOS platform SDK
        run: |
          # Downloads the iOS SDK matching the selected Xcode (iOS 26 on Xcode 26)
          xcodebuild -downloadPlatform iOS

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Amperfy.xcodeproj \
            -scheme Amperfy

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project Amperfy.xcodeproj \
            -scheme Amperfy \
            -destination "generic/platform=iOS" \
            -archivePath build/Amperfy.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates

      - name: Create IPA from archive
        run: |
          mkdir -p build/Payload
          cp -r build/Amperfy.xcarchive/Products/Applications/Amperfy.app build/Payload/
          cd build
          zip -r Amperfy-unsigned.ipa Payload
          ls -la Amperfy-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amperfy-unsigned-ipa
          path: build/Amperfy-unsigned.ipa
          retention-days: 30
