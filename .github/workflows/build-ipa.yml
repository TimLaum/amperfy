name: Build Amperfy IPA

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install iOS platform
        run: |
          xcodebuild -downloadPlatform iOS

      - name: List available destinations
        run: |
          xcodebuild -project Amperfy.xcodeproj \
            -scheme Amperfy \
            -showdestinations 2>/dev/null | head -30

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Amperfy.xcodeproj \
            -scheme Amperfy

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project Amperfy.xcodeproj \
            -scheme Amperfy \
            -destination "generic/platform=iOS" \
            -archivePath build/Amperfy.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates

      - name: Create IPA from archive
        run: |
          mkdir -p build/Payload
          cp -r build/Amperfy.xcarchive/Products/Applications/Amperfy.app build/Payload/
          cd build
          zip -r Amperfy-unsigned.ipa Payload
          ls -la Amperfy-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amperfy-unsigned-ipa
          path: build/Amperfy-unsigned.ipa
          retention-days: 30
